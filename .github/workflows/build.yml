name: Cargo Build

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup update stable && rustup default stable
      - run: cargo build --verbose
      - run: cargo test --verbose

  build_and_test_demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd examples/demo
      - run: rustup update stable && rustup default stable
      - run: cargo build --verbose
      - run: cargo test --verbose

  build_and_test_wave_interference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd examples/wave-interference
      - run: rustup update stable && rustup default stable
      - run: cargo build --verbose
      - run: cargo test --verbose

